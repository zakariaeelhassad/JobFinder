<div class="min-h-screen bg-gray-50 py-8">
    <div class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="bg-white rounded-2xl shadow-lg p-8">
            <div class="flex justify-between items-center mb-8">
                <h1 class="text-3xl font-bold text-gray-900">Mon Profil</h1>
                <button (click)="logout()"
                    class="bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded-lg font-medium transition-all">
                    Déconnexion
                </button>
            </div>

            @if (successMessage()) {
            <div class="bg-green-50 border-l-4 border-green-500 p-4 rounded mb-6">
                <p class="text-green-700">{{ successMessage() }}</p>
            </div>
            }

            @if (errorMessage()) {
            <div class="bg-red-50 border-l-4 border-red-500 p-4 rounded mb-6">
                <p class="text-red-700">{{ errorMessage() }}</p>
            </div>
            }

            <form [formGroup]="profileForm" (ngSubmit)="onSubmit()" class="space-y-6">
                <div>
                    <label for="nom" class="block text-sm font-medium text-gray-700 mb-2">Nom</label>
                    <input id="nom" type="text" formControlName="nom" [disabled]="!isEditing()"
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent disabled:bg-gray-100" />
                </div>

                <div>
                    <label for="prenom" class="block text-sm font-medium text-gray-700 mb-2">Prénom</label>
                    <input id="prenom" type="text" formControlName="prenom" [disabled]="!isEditing()"
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent disabled:bg-gray-100" />
                </div>

                <div>
                    <label for="email" class="block text-sm font-medium text-gray-700 mb-2">Email</label>
                    <input id="email" type="email" formControlName="email" [disabled]="!isEditing()"
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent disabled:bg-gray-100" />
                </div>

                <div class="flex gap-4">
                    @if (!isEditing()) {
                    <button type="button" (click)="toggleEdit()"
                        class="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-3 rounded-lg font-medium transition-all">
                        Modifier
                    </button>
                    } @else {
                    <button type="submit"
                        class="flex-1 bg-green-600 hover:bg-green-700 text-white px-6 py-3 rounded-lg font-medium transition-all">
                        Enregistrer
                    </button>
                    <button type="button" (click)="toggleEdit()"
                        class="flex-1 bg-gray-500 hover:bg-gray-600 text-white px-6 py-3 rounded-lg font-medium transition-all">
                        Annuler
                    </button>
                    }
                </div>
            </form>

            <div class="mt-8 pt-8 border-t border-gray-200">
                <h2 class="text-xl font-bold text-gray-900 mb-4">Zone de danger</h2>
                <button (click)="deleteAccount()"
                    class="bg-red-600 hover:bg-red-700 text-white px-6 py-3 rounded-lg font-medium transition-all">
                    Supprimer mon compte
                </button>
            </div>
        </div>
    </div>
</div>
