<div class="bg-white rounded-2xl p-6 shadow-md hover:translate-y-[-4px] hover:shadow-xl transition-all duration-300">
    <div class="flex justify-between items-start mb-4">
        <div class="flex-1">
            <h3 class="text-xl font-bold text-gray-900 mb-2">{{ offer.title }}</h3>
            <p class="text-lg text-indigo-600 font-semibold mb-1">{{ offer.company.display_name }}</p>
            <div class="flex items-center text-gray-600 text-sm space-x-4">
                <span class="flex items-center">
                    <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
                    </svg>
                    {{ offer.location.display_name }}
                </span>
                <span class="flex items-center">
                    <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                    {{ offer.created | dateAgo }}
                </span>
            </div>
        </div>

        @if (isAuthenticated) {
        <button (click)="isFavorite ? onRemoveFromFavorites() : onAddToFavorites()"
            class="ml-4 p-2 rounded-full hover:bg-gray-100 transition-colors" [class.text-red-500]="isFavorite"
            [class.text-gray-400]="!isFavorite">
            <svg class="w-6 h-6" [class.fill-current]="isFavorite" fill="none" stroke="currentColor"
                viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" />
            </svg>
        </button>
        }
    </div>

    <p class="text-gray-700 mb-4 leading-relaxed">
        {{ offer.description | truncate:200 }}
    </p>

    <div class="flex items-center justify-between pt-4 border-t border-gray-200">
        <div class="text-sm">
            @if (offer.contract_type) {
            <span class="inline-block bg-indigo-100 text-indigo-800 px-3 py-1 rounded-full mr-2">
                {{ offer.contract_type }}
            </span>
            }
            <span class="inline-block bg-green-100 text-green-800 px-3 py-1 rounded-full font-semibold">
                {{ formatSalary() }}
            </span>
        </div>
    </div>

    <div class="flex gap-3 mt-4">
        <a [href]="offer.redirect_url" target="_blank" rel="noopener noreferrer"
            class="flex-1 text-center bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg font-medium transition-all">
            Voir l'offre
        </a>

        @if (isAuthenticated) {
        <button (click)="onTrackApplication()"
            class="flex-1 bg-purple-600 hover:bg-purple-700 text-white px-4 py-2 rounded-lg font-medium transition-all">
            Suivre
        </button>
        }
    </div>
</div>
